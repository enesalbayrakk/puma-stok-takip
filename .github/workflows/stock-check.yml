name: PUMA beden takibi

on:
  schedule:
    # Her 5 dakikada bir. NOT: GitHub'ın izin verdiği en sık değer 5 dk'dır
    # ve zamanlama garanti değildir (yoğunlukta gecikebilir/atlanabilir).
    - cron: "*/5 * * * *"
  workflow_dispatch:        # "Run workflow" ile elle de çalıştırabilirsin

permissions:
  contents: write           # state.json'u repoya geri yazabilmek için

concurrency:
  group: puma-stok
  cancel-in-progress: false

jobs:
  kontrol:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      # --- İSTEĞE BAĞLI: anti-bot yedeği ---
      # Eğer loglarda "belirsiz / engellendi" görürsen aşağıdaki satırın
      # başındaki # işaretini kaldır (tarayıcıyı kurar, çalışmayı ~1-2 dk uzatır).
      - name: Tarayıcı kur (yedek yol)
        run: python -m playwright install --with-deps chromium

      - name: Stok kontrolü
        env:
          TARGET_SIZE: "M"
          PLAYWRIGHT_FALLBACK: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python monitor.py

      - name: Durum değiştiyse kaydet
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "stok durumu güncellendi"
            git push
          else
            echo "Durum değişmedi, commit yok."
          fi
